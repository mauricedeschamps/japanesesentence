<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title id="pageTitle">NIHONGO Builder | Japanese Learning App</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e1e2f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.jpg">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      transition: background-color 0.2s, color 0.2s;
    }
    body {
      font-family: system-ui, 'Segoe UI', 'Noto Sans JP', sans-serif;
      background: #f5f5f7;
      color: #1e1e2f;
      padding: 0 1rem 2rem;
      min-height: 100vh;
    }
    body.dark {
      background: #12121a;
      color: #eef2ff;
    }
    .app-container {
      max-width: 700px;
      margin: 0 auto;
    }
    .app-header {
      padding: 1rem 0 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.75rem;
      border-bottom: 2px solid #ffb347;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ff8c00, #ff2e2e);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin: 0;
    }
    .toolbar {
      display: flex;
      gap: 0.8rem;
    }
    .icon-btn {
      background: rgba(0,0,0,0.08);
      border: none;
      border-radius: 40px;
      padding: 0.4rem 1rem;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.9rem;
    }
    body.dark .icon-btn {
      background: #2a2a3c;
      color: #ffd966;
    }
    .icon-btn:active { transform: scale(0.96); }
    .builder-panel {
      background: rgba(255,255,245,0.95);
      border-radius: 2rem;
      padding: 1.2rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      margin-bottom: 1.5rem;
    }
    body.dark .builder-panel {
      background: #1e1e2c;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }
    .sentence-area {
      background: #fff0dd;
      padding: 1rem;
      border-radius: 1.5rem;
      margin-bottom: 1.5rem;
      text-align: center;
      font-weight: 500;
      word-break: break-word;
    }
    body.dark .sentence-area {
      background: #2a2a36;
    }
    .jp-sentence {
      font-size: 1.8rem;
      letter-spacing: 1px;
      margin-bottom: 0.3rem;
    }
    .romaji-sentence {
      font-size: 1rem;
      opacity: 0.75;
      font-family: monospace;
    }
    .speech-btn {
      background: #ffb347;
      border: none;
      font-size: 1.4rem;
      padding: 0.4rem 1rem;
      border-radius: 3rem;
      margin-top: 0.6rem;
      cursor: pointer;
      font-weight: bold;
    }
    body.dark .speech-btn { background: #cc7b2e; color: white; }
    .buttons-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      margin-top: 1rem;
    }
    .option-btn {
      background: #eef2ff;
      border: none;
      border-radius: 60px;
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.1s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      color: #1e1e2f;
    }
    body.dark .option-btn {
      background: #2e2e42;
      color: #f0f0ff;
    }
    .option-btn:active { transform: scale(0.96); background: #cdd9ff; }
    .back-btn {
      background: #b0b0c0;
      color: #1e1e2f;
      margin-right: auto;
    }
    body.dark .back-btn { background: #4a4a60; color: white; }
    .app-footer {
      text-align: center;
      padding: 1.5rem 0 0.5rem;
      font-size: 0.8rem;
      border-top: 1px solid #ccc;
      margin-top: 1rem;
    }
    body.dark .app-footer { border-color: #333; }
    .contact-email {
      font-family: monospace;
      font-size: 0.9rem;
      text-decoration: none;
      color: #ff8c42;
    }
    .feature-row {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin: 1rem 0 0.5rem;
      flex-wrap: wrap;
    }
    .demo-img {
      width: 100%;
      max-height: 120px;
      object-fit: cover;
      border-radius: 1rem;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
<div class="app-container">
  <header class="app-header">
    <h1 id="appTitle">📖 NIHONGO Builder</h1>
    <div class="toolbar">
      <button id="themeToggleBtn" class="icon-btn">🌙 ダーク/Dark</button>
      <button id="langToggleBtn" class="icon-btn">🇬🇧 English / 日本語</button>
    </div>
  </header>

  <main>
    <div class="builder-panel" id="dynamicPanel"></div>
    <div class="sentence-area" id="sentenceArea">
      <div class="jp-sentence" id="jpSentence">✨ 文章がここに表示</div>
      <div class="romaji-sentence" id="romajiSentence">✨ Build a sentence!</div>
      <button id="speakBtn" class="speech-btn">🔊 音声を聞く / Listen</button>
    </div>
    <div class="feature-row">
      <img src="https://placehold.co/400x120/FFF3E0/FF8C42?text=Learn+Japanese+with+buttons" alt="Japanese learning" class="demo-img">
    </div>
  </main>

  <footer class="app-footer">
    <div>Contact us</div>
    <a href="mailto:mementomorikatsu@gmail.com" class="contact-email">mementomorikatsu@gmail.com</a>
  </footer>
</div>

<script>
  // --------------------------------------------------------------
  // データ定義：人称代名詞 + 指示代名詞 (これ, それ, あれ)
  // --------------------------------------------------------------
  const PERSONAL_PRONOUNS = [
    { jp: "わたし", rom: "watashi", en: "I", particle: "は" },
    { jp: "あなた", rom: "anata", en: "you", particle: "は" },
    { jp: "かれ", rom: "kare", en: "he", particle: "は" },
    { jp: "かのじょ", rom: "kanojo", en: "she", particle: "は" },
    { jp: "わたしたち", rom: "watashitachi", en: "we", particle: "は" }
  ];

  const DEMONSTRATIVES = [
    { jp: "これ", rom: "kore", en: "this", particle: "は" },
    { jp: "それ", rom: "sore", en: "that", particle: "は" },
    { jp: "あれ", rom: "are", en: "that over there", particle: "は" }
  ];

  // 結合して一覧（主語になるもの）
  const TOPICS = [...PERSONAL_PRONOUNS, ...DEMONSTRATIVES];

  const NOUNS = [
    { jp: "りんご", rom: "ringo", en: "apple" }, { jp: "すし", rom: "sushi", en: "sushi" }, { jp: "みず", rom: "mizu", en: "water" },
    { jp: "ほん", rom: "hon", en: "book" }, { jp: "えいが", rom: "eiga", en: "movie" }, { jp: "おんがく", rom: "ongaku", en: "music" },
    { jp: "にほんご", rom: "nihongo", en: "Japanese" }, { jp: "しごと", rom: "shigoto", en: "work" }, { jp: "くるま", rom: "kuruma", en: "car" },
    { jp: "おかね", rom: "okane", en: "money" }, { jp: "ともだち", rom: "tomodachi", en: "friend" }
  ];

  const ADJECTIVES = [
    { jp: "おおきい", rom: "ookii", en: "big" }, { jp: "ちいさい", rom: "chiisai", en: "small" }, { jp: "あたらしい", rom: "atarashii", en: "new" },
    { jp: "ふるい", rom: "furui", en: "old" }, { jp: "いい", rom: "ii", en: "good" }, { jp: "わるい", rom: "warui", en: "bad" },
    { jp: "たかい", rom: "takai", en: "expensive/high" }, { jp: "やすい", rom: "yasui", en: "cheap" }, { jp: "たのしい", rom: "tanoshii", en: "fun" },
    { jp: "むずかしい", rom: "muzukashii", en: "difficult" }, { jp: "おもしろい", rom: "omoshiroi", en: "interesting" }, { jp: "うつくしい", rom: "utsukushii", en: "beautiful" }
  ];

  const VERBS = [
    { jp: "たべる", rom: "taberu", en: "eat", type: "trans", baseMasu: "たべます", negMasu: "たべません", baseMasuRom: "tabemasu", negMasuRom: "tabemasen" },
    { jp: "のむ", rom: "nomu", en: "drink", type: "trans", baseMasu: "のみます", negMasu: "のみません", baseMasuRom: "nomimasu", negMasuRom: "nomimasen" },
    { jp: "する", rom: "suru", en: "do", type: "trans", baseMasu: "します", negMasu: "しません", baseMasuRom: "shimasu", negMasuRom: "shimasen" },
    { jp: "はなす", rom: "hanasu", en: "speak", type: "trans", baseMasu: "はなします", negMasu: "はなしません", baseMasuRom: "hanashimasu", negMasuRom: "hanashimasen" },
    { jp: "みる", rom: "miru", en: "see/watch", type: "trans", baseMasu: "みます", negMasu: "みません", baseMasuRom: "mimasu", negMasuRom: "mimasen" },
    { jp: "きく", rom: "kiku", en: "listen/ask", type: "trans", baseMasu: "ききます", negMasu: "ききません", baseMasuRom: "kikimasu", negMasuRom: "kikimasen" },
    { jp: "もっている", rom: "motteiru", en: "have", type: "trans", baseMasu: "もっています", negMasu: "もっていません", baseMasuRom: "motteimasu", negMasuRom: "motteimasen" },
    { jp: "いく", rom: "iku", en: "go", type: "motion", particle: "へ", baseMasu: "いきます", negMasu: "いきません", baseMasuRom: "ikimasu", negMasuRom: "ikimasen" },
    { jp: "くる", rom: "kuru", en: "come", type: "motion", particle: "から", baseMasu: "きます", negMasu: "きません", baseMasuRom: "kimasu", negMasuRom: "kimasen" },
    { jp: "とまる", rom: "tomaru", en: "stay", type: "motion", particle: "に", baseMasu: "とまります", negMasu: "とまりません", baseMasuRom: "tomarimasu", negMasuRom: "tomarimasen" }
  ];

  const LOCATIONS = [
    { jp: "がっこう", rom: "gakkou", en: "school" }, { jp: "えき", rom: "eki", en: "station" }, { jp: "こうえん", rom: "kouen", en: "park" },
    { jp: "としょかん", rom: "toshokan", en: "library" }, { jp: "にほん", rom: "nihon", en: "Japan" }, { jp: "アメリカ", rom: "amerika", en: "USA" },
    { jp: "ホテル", rom: "hoteru", en: "hotel" }, { jp: "かいしゃ", rom: "kaisha", en: "company" }
  ];

  const QUESTION_WORDS = [
    { jp: "なに", rom: "nani", en: "what", usedWith: "object", defaultPost: "を" },
    { jp: "だれ", rom: "dare", en: "who", usedWith: "subject", defaultPost: "が" },
    { jp: "いつ", rom: "itsu", en: "when", usedWith: "time", defaultPost: "に" },
    { jp: "どこ", rom: "doko", en: "where", usedWith: "place", defaultPost: "へ" },
    { jp: "どのように", rom: "dounoyouni", en: "how", usedWith: "manner", defaultPost: "" },
    { jp: "なぜ", rom: "naze", en: "why", usedWith: "reason", defaultPost: "" }
  ];

  // ---------- グローバル状態 ----------
  let currentState = {
    step: 0,
    pattern: null,
    selectedTopic: null,
    selectedVerb: null,
    selectedObjectNoun: null,
    selectedLocation: null,
    selectedAdjective: null,
    selectedCopulaNoun: null,
    selectedQuestionWord: null,
    sentenceType: null,
    needVerbForQW: false,
    verbChosenForQW: null,
    nounAdjForQW: null,
    copulaOnlyForQW: false,   // 新設: 疑問詞 + だけ (例: これは何ですか)
    copulaMode: null
  };
  let langMode = 'en';
  let darkTheme = true;

  const dynamicPanel = document.getElementById('dynamicPanel');
  const jpSentenceSpan = document.getElementById('jpSentence');
  const romajiSentenceSpan = document.getElementById('romajiSentence');
  const speakButton = document.getElementById('speakBtn');
  const appTitle = document.getElementById('appTitle');
  const pageTitle = document.getElementById('pageTitle');

  function updateTitles() {
    if (langMode === 'en') {
      appTitle.textContent = '📖 NIHONGO Builder';
      pageTitle.textContent = 'NIHONGO Builder | Japanese Learning App';
    } else {
      appTitle.textContent = '📖 にほんごビルダー';
      pageTitle.textContent = 'にほんごビルダー | 日本語学習アプリ';
    }
  }

  function getDisplayText(item, type, particle = null) {
    if (!item) return "";
    if (langMode === 'en') {
      let main = item.en || item.jp;
      let sub = item.rom ? `(${item.rom})` : "";
      return `${main} ${sub}`.trim();
    } else {
      let main = item.jp;
      let sub = item.rom ? `(${item.rom})` : "";
      return `${main} ${sub}`.trim();
    }
  }

  function getTopicDisplay(topic) {
    if (langMode === 'en') {
      return `${topic.en} (${topic.jp}-${topic.particle === "は" ? "wa" : topic.particle})`;
    } else {
      return `${topic.jp}-${topic.particle} (${topic.rom}-${topic.particle === "は" ? "wa" : topic.particle})`;
    }
  }

  function convertParticlesForSpeech(text) {
    return text.replace(/([^\s]+)は/g, (match, p1) => p1 + 'わ')
               .replace(/([^\s]+)へ/g, (match, p1) => p1 + 'え');
  }
  function speakJapaneseSentence(jpText) {
    if (!window.speechSynthesis) return;
    let utteranceText = convertParticlesForSpeech(jpText);
    const utterance = new SpeechSynthesisUtterance(utteranceText);
    utterance.lang = 'ja-JP';
    utterance.rate = 0.9;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utterance);
  }

  // 文生成 (コア)
  function buildCurrentSentence() {
    let jp = "", rom = "";
    const s = currentState;
    if (!s.pattern) return { jp: langMode === 'en' ? "👈 Choose sentence pattern" : "👈 文の型を選んでね", rom: "Select type first" };
    if (!s.selectedTopic) return { jp: langMode === 'en' ? "📌 Select a topic (pronoun/demonstrative)" : "📌 話題（代名詞/指示詞）を選んでください", rom: "Choose topic" };
    const topic = s.selectedTopic;
    const topicPart = `${topic.jp}-${topic.particle}`;
    const topicRom = `${topic.rom}-${topic.particle === "は" ? "wa" : topic.particle}`;

    // コピュラ文
    if (s.pattern === 'copula') {
      let predicate = "", predRom = "", isAdj = false;
      if (s.selectedAdjective) {
        predicate = s.selectedAdjective.jp;
        predRom = s.selectedAdjective.rom;
        isAdj = true;
      } else if (s.selectedCopulaNoun) {
        predicate = s.selectedCopulaNoun.jp;
        predRom = s.selectedCopulaNoun.rom;
      } else return { jp: langMode === 'en' ? "Select adjective/noun" : "形容詞か名詞を選んで", rom: "Choose predicate" };
      if (isAdj) {
        let adj = predicate, adjRom = predRom;
        if (s.sentenceType === 'negative') {
          let stem = adj.slice(0, -1);
          let romStem = adjRom.slice(0, -1);
          if (adj === "いい") { stem = "よ"; romStem = "yo"; }
          adj = stem + "くない";
          adjRom = romStem + "kunai";
          jp = `${topicPart} ${adj} です`;
          rom = `${topicRom} ${adjRom} desu`;
        } else if (s.sentenceType === 'interrogative') {
          jp = `${topicPart} ${adj} ですか`;
          rom = `${topicRom} ${adjRom} desu ka`;
        } else {
          jp = `${topicPart} ${adj} です`;
          rom = `${topicRom} ${adjRom} desu`;
        }
        return { jp, rom };
      } else {
        let noun = predicate, nounRom = predRom;
        if (s.sentenceType === 'negative') {
          jp = `${topicPart} ${noun} じゃないです`;
          rom = `${topicRom} ${nounRom} janai desu`;
        } else if (s.sentenceType === 'interrogative') {
          jp = `${topicPart} ${noun} ですか`;
          rom = `${topicRom} ${nounRom} desu ka`;
        } else {
          jp = `${topicPart} ${noun} です`;
          rom = `${topicRom} ${nounRom} desu`;
        }
        return { jp, rom };
      }
    }

    // 動詞文
    if (s.pattern === 'verbObj') {
      const verb = s.selectedVerb;
      if (!verb) return { jp: langMode === 'en' ? "Choose verb" : "動詞を選んで", rom: "Select verb" };
      let objectPart = "", objectRom = "";
      if (verb.type === 'motion') {
        let place = s.selectedLocation;
        if (!place) return { jp: langMode === 'en' ? "Choose location" : "場所を選んで", rom: "Select location" };
        let particle = verb.particle;
        objectPart = `${place.jp}-${particle}`;
        objectRom = `${place.rom}-${particle === "へ" ? "e" : particle}`;
      } else {
        let obj = s.selectedObjectNoun;
        if (!obj) return { jp: langMode === 'en' ? "Choose object (noun)" : "目的語(名詞)を選んで", rom: "Select object" };
        objectPart = `${obj.jp}-を`;
        objectRom = `${obj.rom}-o`;
      }
      let verbForm = "", verbFormRom = "";
      if (s.sentenceType === 'negative') {
        verbForm = verb.negMasu;
        verbFormRom = verb.negMasuRom;
      } else if (s.sentenceType === 'interrogative') {
        verbForm = verb.baseMasu + "か";
        verbFormRom = verb.baseMasuRom + " ka";
      } else {
        verbForm = verb.baseMasu;
        verbFormRom = verb.baseMasuRom;
      }
      jp = `${topicPart} ${objectPart} ${verbForm}`;
      rom = `${topicRom} ${objectRom} ${verbFormRom}`;
      return { jp, rom };
    }

    // 疑問詞文（拡張：コピュラのみ対応）
    if (s.pattern === 'questionWord') {
      const qw = s.selectedQuestionWord;
      if (!qw) return { jp: langMode === 'en' ? "Choose question word" : "疑問詞を選んで", rom: "Select question word" };
      
      // パターンA: 疑問詞 + だけ (です/ですか)
      if (s.copulaOnlyForQW) {
        let copula = "";
        let copulaRom = "";
        if (s.sentenceType === 'interrogative') {
          copula = "ですか";
          copulaRom = "desu ka";
        } else if (s.sentenceType === 'negative') {
          copula = "じゃないです";
          copulaRom = "janai desu";
        } else {
          copula = "です";
          copulaRom = "desu";
        }
        // 疑問詞に助詞を付けない（何ですか？　どこですか？ など）
        let qwDisplay = qw.jp;
        let qwRom = qw.rom;
        jp = `${topicPart} ${qwDisplay} ${copula}`;
        rom = `${topicRom} ${qwRom} ${copulaRom}`;
        return { jp, rom };
      }
      
      // パターンB: 動詞を使う または 名詞/形容詞を使う
      let hasVerb = s.verbChosenForQW;
      let hasNounAdj = s.nounAdjForQW;
      if (!hasVerb && !hasNounAdj) return { jp: langMode === 'en' ? "Choose verb, adj/noun, or copula-only" : "動詞／形容詞・名詞／コピュラのみを選んで", rom: "Select predicate" };
      let predPart = "", predRom = "";
      let particle = "";
      if (hasVerb) {
        let verb = hasVerb;
        if (qw.jp === "なに") particle = "を";
        else if (qw.jp === "どこ") particle = "へ";
        else if (qw.jp === "だれ") particle = "が";
        let verbForm = (s.sentenceType === 'negative' ? verb.negMasu : verb.baseMasu);
        let verbRom = (s.sentenceType === 'negative' ? verb.negMasuRom : verb.baseMasuRom);
        if (s.sentenceType === 'interrogative') {
          verbForm = verb.baseMasu + "か";
          verbRom = verb.baseMasuRom + " ka";
        }
        predPart = `${particle ? particle+" " : ""}${verbForm}`;
        predRom = `${particle ? particle+" " : ""}${verbRom}`;
      } else if (hasNounAdj) {
        let item = hasNounAdj;
        let isAdj = ADJECTIVES.includes(item);
        if (isAdj) {
          let adj = item.jp, adjRom = item.rom;
          if (s.sentenceType === 'negative') {
            let stem = adj.slice(0, -1);
            let romStem = adjRom.slice(0, -1);
            if (adj === "いい") { stem = "よ"; romStem = "yo"; }
            adj = stem + "くないです";
            adjRom = romStem + "kunaidesu";
          } else {
            adj = adj + "です";
            adjRom = adjRom + "desu";
          }
          predPart = adj;
          predRom = adjRom;
        } else {
          let noun = item.jp, nounRom = item.rom;
          if (s.sentenceType === 'negative') {
            predPart = noun + "じゃないです";
            predRom = nounRom + "janaidesu";
          } else {
            predPart = noun + "です";
            predRom = nounRom + "desu";
          }
        }
      }
      const qwDisplay = `${qw.jp}${particle ? `-${particle}` : ''}`;
      const qwRom = `${qw.rom}${particle ? `-${particle === "へ" ? "e" : particle}` : ''}`;
      jp = `${topicPart} ${qwDisplay} ${predPart}`;
      rom = `${topicRom} ${qwRom} ${predRom}`;
      return { jp, rom };
    }
    return { jp: "Error", rom: "Error" };
  }

  function updateSentenceDisplay() {
    const { jp, rom } = buildCurrentSentence();
    jpSentenceSpan.innerText = jp;
    romajiSentenceSpan.innerText = rom;
  }

  // UI レンダリング
  function renderUI() {
    let html = `<div class="buttons-grid"><button id="backBtn" class="option-btn back-btn">🔙 ${langMode === 'en' ? 'Back' : '戻る'}</button>`;
    const s = currentState;

    if (s.step === 0) {
      html += `<button data-action="pattern_copula" class="option-btn">📘 ${langMode === 'en' ? 'Noun/Adjective + desu' : '〜は〇〇です'}</button>`;
      html += `<button data-action="pattern_verb" class="option-btn">⚡ ${langMode === 'en' ? 'Verb (Transitive/Motion)' : '〜は〜を動詞'}</button>`;
      html += `<button data-action="pattern_qw" class="option-btn">❓ ${langMode === 'en' ? 'Question Word (what/who/where...)' : '疑問詞文'}</button>`;
      html += `</div>`;
    }
    else if (s.step === 1) {
      TOPICS.forEach(t => {
        let display = getTopicDisplay(t);
        html += `<button data-select-topic='${JSON.stringify(t)}' class="option-btn">${display}</button>`;
      });
      html += `</div>`;
    }
    else if (s.pattern === 'copula') {
      if (s.step === 2) {
        html += `<button data-copula-type="adj" class="option-btn">📗 ${langMode === 'en' ? 'Adjective (i-adjective)' : '形容詞'}</button>`;
        html += `<button data-copula-type="noun" class="option-btn">📙 ${langMode === 'en' ? 'Noun' : '名詞'}</button></div>`;
      } else if (s.step === 3 && s.copulaMode === 'adj') {
        ADJECTIVES.forEach(a => {
          html += `<button data-select-adj="${a.jp}" data-rom="${a.rom}" data-en="${a.en}" class="option-btn">${getDisplayText(a, 'adj')}</button>`;
        });
        html += `</div>`;
      } else if (s.step === 3 && s.copulaMode === 'noun') {
        NOUNS.forEach(n => {
          html += `<button data-select-noun="${n.jp}" data-rom="${n.rom}" data-en="${n.en}" class="option-btn">${getDisplayText(n, 'noun')}</button>`;
        });
        html += `</div>`;
      } else if (s.step === 4) {
        html += `<button data-sent-type="affirmative" class="option-btn">✅ ${langMode === 'en' ? 'Affirmative' : '肯定'}</button>`;
        html += `<button data-sent-type="negative" class="option-btn">❌ ${langMode === 'en' ? 'Negative' : '否定'}</button>`;
        html += `<button data-sent-type="interrogative" class="option-btn">❓ ${langMode === 'en' ? 'Interrogative' : '疑問'}</button></div>`;
      }
    }
    else if (s.pattern === 'verbObj') {
      if (s.step === 2) {
        VERBS.forEach(v => {
          html += `<button data-select-verb='${JSON.stringify(v)}' class="option-btn">${getDisplayText(v, 'verb')}</button>`;
        });
        html += `</div>`;
      } else if (s.step === 3) {
        let verb = s.selectedVerb;
        if (verb && verb.type === 'motion') {
          LOCATIONS.forEach(loc => {
            html += `<button data-select-location='${JSON.stringify(loc)}' class="option-btn">${getDisplayText(loc, 'location')}</button>`;
          });
        } else {
          NOUNS.forEach(n => {
            html += `<button data-select-object='${JSON.stringify(n)}' class="option-btn">${getDisplayText(n, 'noun')}</button>`;
          });
        }
        html += `</div>`;
      } else if (s.step === 4) {
        html += `<button data-sent-type="affirmative" class="option-btn">✔ ${langMode === 'en' ? 'Affirmative' : '肯定'}</button>`;
        html += `<button data-sent-type="negative" class="option-btn">✘ ${langMode === 'en' ? 'Negative' : '否定'}</button>`;
        html += `<button data-sent-type="interrogative" class="option-btn">❔ ${langMode === 'en' ? 'Question' : '疑問'}</button></div>`;
      }
    }
    else if (s.pattern === 'questionWord') {
      if (s.step === 2) {
        QUESTION_WORDS.forEach(q => {
          html += `<button data-select-qw='${JSON.stringify(q)}' class="option-btn">${getDisplayText(q, 'qw')}</button>`;
        });
        html += `</div>`;
      } else if (s.step === 3) {
        html += `<button data-qw-part="verb" class="option-btn">➕ ${langMode === 'en' ? 'Use verb' : '動詞を使う'}</button>`;
        html += `<button data-qw-part="nounadj" class="option-btn">📚 ${langMode === 'en' ? 'Noun/Adjective' : '名詞/形容詞'}</button>`;
        html += `<button data-qw-part="copula" class="option-btn">❓ ${langMode === 'en' ? 'Copula only (です/ですか)' : 'コピュラのみ (です/ですか)'}</button></div>`;
      } else if (s.step === 4 && s.needVerbForQW) {
        VERBS.forEach(v => {
          html += `<button data-select-qv='${JSON.stringify(v)}' class="option-btn">${getDisplayText(v, 'verb')}</button>`;
        });
        html += `</div>`;
      } else if (s.step === 4 && !s.needVerbForQW && !s.copulaOnlyForQW) {
        ADJECTIVES.forEach(a => {
          html += `<button data-select-qna='${JSON.stringify(a)}' class="option-btn" data-type="adj">${getDisplayText(a, 'adj')}</button>`;
        });
        NOUNS.forEach(n => {
          html += `<button data-select-qna='${JSON.stringify(n)}' class="option-btn" data-type="noun">${getDisplayText(n, 'noun')}</button>`;
        });
        html += `</div>`;
      } else if (s.step === 4 && s.copulaOnlyForQW) {
        // コピュラのみの場合、直接肯定/否定/疑問の選択へ
        s.step = 5; // 強制的に進める
        renderUI();
        return;
      } else if (s.step === 5) {
        html += `<button data-sent-type="affirmative" class="option-btn">✅ ${langMode === 'en' ? 'Affirmative' : '肯定'}</button>`;
        html += `<button data-sent-type="negative" class="option-btn">❌ ${langMode === 'en' ? 'Negative' : '否定'}</button>`;
        html += `<button data-sent-type="interrogative" class="option-btn">❓ ${langMode === 'en' ? 'Interrogative' : '疑問'}</button></div>`;
      }
    }
    dynamicPanel.innerHTML = html;
    attachPanelEvents();
    updateSentenceDisplay();
  }

  function attachPanelEvents() {
    document.querySelectorAll('[data-action]').forEach(btn => {
      btn.onclick = () => {
        let act = btn.dataset.action;
        if (act === 'pattern_copula') { resetToPattern('copula'); }
        if (act === 'pattern_verb') { resetToPattern('verbObj'); }
        if (act === 'pattern_qw') { resetToPattern('questionWord'); }
      };
    });
    document.querySelectorAll('[data-select-topic]').forEach(btn => {
      btn.onclick = () => {
        let topic = JSON.parse(btn.dataset.selectTopic);
        currentState.selectedTopic = topic;
        currentState.step = 2;
        renderUI();
      };
    });
    document.querySelectorAll('[data-copula-type]').forEach(btn => {
      btn.onclick = () => { currentState.copulaMode = btn.dataset.copulaType; currentState.step = 3; renderUI(); };
    });
    document.querySelectorAll('[data-select-adj]').forEach(btn => {
      btn.onclick = () => { currentState.selectedAdjective = { jp: btn.dataset.selectAdj, rom: btn.dataset.rom, en: btn.dataset.en }; currentState.step = 4; renderUI(); };
    });
    document.querySelectorAll('[data-select-noun]').forEach(btn => {
      btn.onclick = () => { currentState.selectedCopulaNoun = { jp: btn.dataset.selectNoun, rom: btn.dataset.rom, en: btn.dataset.en }; currentState.step = 4; renderUI(); };
    });
    document.querySelectorAll('[data-select-verb]').forEach(btn => {
      btn.onclick = () => { let v = JSON.parse(btn.dataset.selectVerb); currentState.selectedVerb = v; currentState.step = 3; renderUI(); };
    });
    document.querySelectorAll('[data-select-object]').forEach(btn => {
      btn.onclick = () => { currentState.selectedObjectNoun = JSON.parse(btn.dataset.selectObject); currentState.step = 4; renderUI(); };
    });
    document.querySelectorAll('[data-select-location]').forEach(btn => {
      btn.onclick = () => { currentState.selectedLocation = JSON.parse(btn.dataset.selectLocation); currentState.step = 4; renderUI(); };
    });
    document.querySelectorAll('[data-sent-type]').forEach(btn => {
      btn.onclick = () => { currentState.sentenceType = btn.dataset.sentType; renderUI(); updateSentenceDisplay(); };
    });
    document.querySelectorAll('[data-select-qw]').forEach(btn => {
      btn.onclick = () => { currentState.selectedQuestionWord = JSON.parse(btn.dataset.selectQw); currentState.step = 3; renderUI(); };
    });
    document.querySelectorAll('[data-qw-part]').forEach(btn => {
      btn.onclick = () => {
        let part = btn.dataset.qwPart;
        if (part === 'verb') {
          currentState.needVerbForQW = true;
          currentState.copulaOnlyForQW = false;
          currentState.nounAdjForQW = null;
          currentState.verbChosenForQW = null;
          currentState.step = 4;
        } else if (part === 'nounadj') {
          currentState.needVerbForQW = false;
          currentState.copulaOnlyForQW = false;
          currentState.verbChosenForQW = null;
          currentState.nounAdjForQW = null;
          currentState.step = 4;
        } else if (part === 'copula') {
          currentState.needVerbForQW = false;
          currentState.copulaOnlyForQW = true;
          currentState.verbChosenForQW = null;
          currentState.nounAdjForQW = null;
          currentState.step = 4; // 次へ進むが、renderUIで自動的にstep=5へ
        }
        renderUI();
      };
    });
    document.querySelectorAll('[data-select-qv]').forEach(btn => {
      btn.onclick = () => { currentState.verbChosenForQW = JSON.parse(btn.dataset.selectQv); currentState.step = 5; renderUI(); };
    });
    document.querySelectorAll('[data-select-qna]').forEach(btn => {
      btn.onclick = () => { let item = JSON.parse(btn.dataset.selectQna); currentState.nounAdjForQW = item; currentState.step = 5; renderUI(); };
    });
    const backBtn = document.getElementById('backBtn');
    if (backBtn) backBtn.onclick = () => { if(currentState.step > 0) currentState.step--; renderUI(); };
  }

  function resetToPattern(pattern) {
    currentState = {
      step: 1,
      pattern: pattern,
      selectedTopic: null,
      selectedVerb: null,
      selectedObjectNoun: null,
      selectedLocation: null,
      selectedAdjective: null,
      selectedCopulaNoun: null,
      selectedQuestionWord: null,
      sentenceType: 'affirmative',
      needVerbForQW: false,
      verbChosenForQW: null,
      nounAdjForQW: null,
      copulaOnlyForQW: false,
      copulaMode: null
    };
    renderUI();
  }

  function resetState() {
    currentState = { step:0, pattern:null, selectedTopic:null, sentenceType:'affirmative' };
    renderUI();
  }

  // イベント登録
  document.getElementById('langToggleBtn').onclick = () => {
    langMode = (langMode === 'ja' ? 'en' : 'ja');
    updateTitles();
    renderUI();
  };
  document.getElementById('themeToggleBtn').onclick = () => {
    darkTheme = !darkTheme;
    document.body.classList.toggle('dark', darkTheme);
  };
  speakButton.onclick = () => { let txt = jpSentenceSpan.innerText; if(txt && !txt.includes("👈") && !txt.includes("Select") && !txt.includes("選んで")) speakJapaneseSentence(txt); };
  
  document.body.classList.add('dark');
  updateTitles();
  resetState();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => console.log('SW error', err));
    });
  }
</script>
</body>
</html>
