<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>NIHONGO Builder | 日本語学習アプリ</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e1e2f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.jpg">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      transition: background-color 0.2s, color 0.2s;
    }

    body {
      font-family: system-ui, 'Segoe UI', 'Noto Sans JP', sans-serif;
      background: #f5f5f7;
      color: #1e1e2f;
      padding: 0 1rem 2rem;
      min-height: 100vh;
    }

    body.dark {
      background: #12121a;
      color: #eef2ff;
    }

    /* container */
    .app-container {
      max-width: 700px;
      margin: 0 auto;
    }

    /* header */
    .app-header {
      padding: 1rem 0 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.75rem;
      border-bottom: 2px solid #ffb347;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ff8c00, #ff2e2e);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .toolbar {
      display: flex;
      gap: 0.8rem;
    }
    .icon-btn {
      background: rgba(0,0,0,0.08);
      border: none;
      border-radius: 40px;
      padding: 0.4rem 1rem;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.1s;
    }
    body.dark .icon-btn {
      background: #2a2a3c;
      color: #ffd966;
    }
    .icon-btn:active { transform: scale(0.96); }

    /* main panel */
    .builder-panel {
      background: rgba(255,255,245,0.95);
      border-radius: 2rem;
      padding: 1.2rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      margin-bottom: 1.5rem;
    }
    body.dark .builder-panel {
      background: #1e1e2c;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    /* 現在の文表示 */
    .sentence-area {
      background: #fff0dd;
      padding: 1rem;
      border-radius: 1.5rem;
      margin-bottom: 1.5rem;
      text-align: center;
      font-weight: 500;
      word-break: break-word;
    }
    body.dark .sentence-area {
      background: #2a2a36;
    }
    .jp-sentence {
      font-size: 1.8rem;
      letter-spacing: 1px;
      margin-bottom: 0.3rem;
    }
    .romaji-sentence {
      font-size: 1rem;
      opacity: 0.75;
      font-family: monospace;
    }
    .speech-btn {
      background: #ffb347;
      border: none;
      font-size: 1.4rem;
      padding: 0.4rem 1rem;
      border-radius: 3rem;
      margin-top: 0.6rem;
      cursor: pointer;
      font-weight: bold;
    }
    body.dark .speech-btn { background: #cc7b2e; color: white; }

    /* ボタングリッド */
    .buttons-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      margin-top: 1rem;
    }
    .option-btn {
      background: #eef2ff;
      border: none;
      border-radius: 60px;
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.1s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      color: #1e1e2f;
    }
    body.dark .option-btn {
      background: #2e2e42;
      color: #f0f0ff;
    }
    .option-btn:active { transform: scale(0.96); background: #cdd9ff; }
    .back-btn {
      background: #b0b0c0;
      color: #1e1e2f;
      margin-right: auto;
    }
    body.dark .back-btn { background: #4a4a60; color: white; }

    /* footer */
    .app-footer {
      text-align: center;
      padding: 1.5rem 0 0.5rem;
      font-size: 0.8rem;
      border-top: 1px solid #ccc;
      margin-top: 1rem;
    }
    body.dark .app-footer { border-color: #333; }
    .contact-email {
      font-family: monospace;
      font-size: 0.9rem;
      text-decoration: none;
      color: #ff8c42;
    }
    .feature-row {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin: 1rem 0 0.5rem;
      flex-wrap: wrap;
    }
    img {
      max-width: 100%;
      border-radius: 1rem;
    }
    .demo-img {
      width: 100%;
      max-height: 120px;
      object-fit: cover;
      border-radius: 1rem;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
<div class="app-container">
  <header class="app-header">
    <h1>📖 にほんごビルダー</h1>
    <div class="toolbar">
      <button id="themeToggleBtn" class="icon-btn">🌙 ダーク</button>
      <button id="langToggleBtn" class="icon-btn">🇬🇧 English</button>
    </div>
  </header>

  <main>
    <div class="builder-panel" id="dynamicPanel">
      <!-- 動的にUIが挿入される -->
    </div>
    <div class="sentence-area" id="sentenceArea">
      <div class="jp-sentence" id="jpSentence">✨ 文章がここに表示</div>
      <div class="romaji-sentence" id="romajiSentence">✨ Build a sentence!</div>
      <button id="speakBtn" class="speech-btn">🔊 音声を聞く / Listen</button>
    </div>
    <div class="feature-row">
      <img src="https://placehold.co/400x120/FFF3E0/FF8C42?text=Japanese+Learning" alt="japanese illustration" class="demo-img" style="background:#ffeedd;">
    </div>
  </main>

  <footer class="app-footer">
    <div>Contact us</div>
    <a href="mailto:mementomorikatsu@gmail.com" class="contact-email">mementomorikatsu@gmail.com</a>
  </footer>
</div>

<script>
  // --------------------------------------------------------------
  // DATA (pronouns, nouns, adjectives, verbs, question words)
  // --------------------------------------------------------------
  const PRONOUNS = [
    { jp: "わたし", rom: "watashi", particle: "は" },
    { jp: "あなた", rom: "anata", particle: "は" },
    { jp: "かれ", rom: "kare", particle: "は" },
    { jp: "かのじょ", rom: "kanojo", particle: "は" },
    { jp: "わたしたち", rom: "watashitachi", particle: "は" }
  ];

  const NOUNS = [
    { jp: "りんご", rom: "ringo" }, { jp: "すし", rom: "sushi" }, { jp: "みず", rom: "mizu" },
    { jp: "ほん", rom: "hon" }, { jp: "えいが", rom: "eiga" }, { jp: "おんがく", rom: "ongaku" },
    { jp: "にほんご", rom: "nihongo" }, { jp: "しごと", rom: "shigoto" }, { jp: "くるま", rom: "kuruma" },
    { jp: "おかね", rom: "okane" }, { jp: "ともだち", rom: "tomodachi" }
  ];

  const ADJECTIVES = [
    { jp: "おおきい", rom: "ookii" }, { jp: "ちいさい", rom: "chiisai" }, { jp: "あたらしい", rom: "atarashii" },
    { jp: "ふるい", rom: "furui" }, { jp: "いい", rom: "ii" }, { jp: "わるい", rom: "warui" },
    { jp: "たかい", rom: "takai" }, { jp: "やすい", rom: "yasui" }, { jp: "たのしい", rom: "tanoshii" },
    { jp: "むずかしい", rom: "muzukashii" }, { jp: "おもしろい", rom: "omoshiroi" }, { jp: "うつくしい", rom: "utsukushii" }
  ];

  const VERBS = [
    { jp: "たべる", rom: "taberu", type: "trans", baseMasu: "たべます", negMasu: "たべません", pastPlain: "たべた" },
    { jp: "のむ", rom: "nomu", type: "trans", baseMasu: "のみます", negMasu: "のみません", pastPlain: "のんだ" },
    { jp: "する", rom: "suru", type: "trans", baseMasu: "します", negMasu: "しません", pastPlain: "した" },
    { jp: "はなす", rom: "hanasu", type: "trans", baseMasu: "はなします", negMasu: "はなしません", pastPlain: "はなした" },
    { jp: "みる", rom: "miru", type: "trans", baseMasu: "みます", negMasu: "みません", pastPlain: "みた" },
    { jp: "きく", rom: "kiku", type: "trans", baseMasu: "ききます", negMasu: "ききません", pastPlain: "きいた" },
    { jp: "もっている", rom: "motteiru", type: "trans", baseMasu: "もっています", negMasu: "もっていません", pastPlain: "もっていた" },
    { jp: "いく", rom: "iku", type: "motion", particle: "へ", baseMasu: "いきます", negMasu: "いきません" },
    { jp: "くる", rom: "kuru", type: "motion", particle: "から", baseMasu: "きます", negMasu: "きません" },
    { jp: "とまる", rom: "tomaru", type: "motion", particle: "に", baseMasu: "とまります", negMasu: "とまりません" }
  ];

  const LOCATIONS = [
    { jp: "がっこう", rom: "gakkou" }, { jp: "えき", rom: "eki" }, { jp: "こうえん", rom: "kouen" },
    { jp: "としょかん", rom: "toshokan" }, { jp: "にほん", rom: "nihon" }, { jp: "アメリカ", rom: "amerika" },
    { jp: "ホテル", rom: "hoteru" }, { jp: "かいしゃ", rom: "kaisha" }
  ];

  const QUESTION_WORDS = [
    { jp: "なに", rom: "nani", usedWith: "object", defaultPost: "を" },
    { jp: "だれ", rom: "dare", usedWith: "subject", defaultPost: "が" },
    { jp: "いつ", rom: "itsu", usedWith: "time", defaultPost: "に" },
    { jp: "どこ", rom: "doko", usedWith: "place", defaultPost: "へ" },
    { jp: "どのように", rom: "dounoyouni", usedWith: "manner", defaultPost: "" },
    { jp: "なぜ", rom: "naze", usedWith: "reason", defaultPost: "" }
  ];

  // ---------- グローバルアプリ状態 ----------
  let currentState = {
    step: 0,          // step machine
    pattern: null,    // 'copula', 'verbObj', 'questionWord'
    selectedPronoun: null,
    selectedVerb: null,
    selectedObjectNoun: null,
    selectedLocation: null,
    selectedAdjective: null,
    selectedCopulaNoun: null,
    selectedQuestionWord: null,
    sentenceType: null,   // 'affirmative', 'negative', 'interrogative'
    needVerbForQW: false, // 疑問詞文で動詞を使うか
    verbChosenForQW: null,
    nounAdjForQW: null
  };

  let navStack = []; // 戻る用簡易スタック
  let langMode = 'ja';   // 'ja' or 'en'
  let darkTheme = true;

  // DOM elements
  const dynamicPanel = document.getElementById('dynamicPanel');
  const jpSentenceSpan = document.getElementById('jpSentence');
  const romajiSentenceSpan = document.getElementById('romajiSentence');
  const speakButton = document.getElementById('speakBtn');

  // Helper: 日本語読み上げ用に「は」→「わ」、「へ」→「え」変換
  function convertParticlesForSpeech(text) {
    return text.replace(/([^\s]+)は/g, (match, p1) => p1 + 'わ')
               .replace(/([^\s]+)へ/g, (match, p1) => p1 + 'え');
  }

  function speakJapaneseSentence(jpText) {
    if (!window.speechSynthesis) return;
    let utteranceText = convertParticlesForSpeech(jpText);
    const utterance = new SpeechSynthesisUtterance(utteranceText);
    utterance.lang = 'ja-JP';
    utterance.rate = 0.9;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utterance);
  }

  // 文生成コア関数
  function buildCurrentSentence() {
    let jp = "", rom = "";
    const state = currentState;
    if (!state.pattern) {
      jp = "👈 ボタンから文の型を選んでね";
      rom = "Choose a sentence pattern";
      return { jp, rom };
    }
    const pronoun = state.selectedPronoun;
    if (!pronoun) {
      jp = "📌 まず代名詞を選んでください";
      rom = "Select a pronoun first";
      return { jp, rom };
    }
    const pronounPart = `${pronoun.jp}-${pronoun.particle}`;
    const pronounRom = `${pronoun.rom}-${pronoun.particle === "は" ? "wa" : pronoun.particle}`;

    // ---------- COPULA パターン (〜は〇〇です) ----------
    if (state.pattern === 'copula') {
      let predicate = "", predRom = "";
      let isAdj = false;
      if (state.selectedAdjective) {
        predicate = state.selectedAdjective.jp;
        predRom = state.selectedAdjective.rom;
        isAdj = true;
      } else if (state.selectedCopulaNoun) {
        predicate = state.selectedCopulaNoun.jp;
        predRom = state.selectedCopulaNoun.rom;
      } else {
        return { jp: "述語を選んでね", rom: "Choose adjective/noun" };
      }
      let copula = "です";
      let copNeg = "ではありません";
      let copRom = "desu";
      let copNegRom = "dewa arimasen";
      if (isAdj) {
        if (state.sentenceType === 'negative') {
          let adjStem = predicate.slice(0, -1);
          if (predicate === "いい") adjStem = "よ";
          predicate = adjStem + "くない";
          predRom = predRom.slice(0, -1) + "kunai";
          copula = "です";
          copRom = "desu";
        } else if (state.sentenceType === 'interrogative') {
          copula = "ですか";
          copRom = "desu ka";
        } else {
          copula = "です";
          copRom = "desu";
        }
        if (state.sentenceType === 'negative') {
          jp = `${pronounPart} ${predicate} ${copula}`;
          rom = `${pronounRom} ${predRom} ${copRom}`;
        } else {
          jp = `${pronounPart} ${predicate}${state.sentenceType === 'interrogative' ? 'ですか' : 'です'}`;
          rom = `${pronounRom} ${predRom}${state.sentenceType === 'interrogative' ? ' desu ka' : ' desu'}`;
        }
        return { jp, rom };
      } else {
        if (state.sentenceType === 'negative') {
          jp = `${pronounPart} ${predicate} ${copNeg}`;
          rom = `${pronounRom} ${predRom} ${copNegRom}`;
        } else if (state.sentenceType === 'interrogative') {
          jp = `${pronounPart} ${predicate} ですか`;
          rom = `${pronounRom} ${predRom} desu ka`;
        } else {
          jp = `${pronounPart} ${predicate} です`;
          rom = `${pronounRom} ${predRom} desu`;
        }
        if (state.sentenceType === 'negative') jp = `${pronounPart} ${predicate} じゃないです`;
        return { jp, rom };
      }
    }

    // ---------- 他動詞 / 移動動詞パターン ----------
    if (state.pattern === 'verbObj') {
      const verb = state.selectedVerb;
      if (!verb) return { jp: "動詞を選んでください", rom: "choose verb" };
      let objectPart = "", objectRom = "";
      let post = "を";
      if (verb.type === 'motion') {
        let place = state.selectedLocation;
        if (!place) return { jp: "場所を選んでください", rom: "choose location" };
        let particle = verb.particle;
        objectPart = `${place.jp}-${particle}`;
        objectRom = `${place.rom}-${particle === "へ" ? "e" : particle}`;
      } else {
        let obj = state.selectedObjectNoun;
        if (!obj) return { jp: "目的語（名詞）を選んでください", rom: "choose object" };
        objectPart = `${obj.jp}-を`;
        objectRom = `${obj.rom}-o`;
      }

      let verbForm = "";
      let verbRom = "";
      if (state.sentenceType === 'negative') {
        verbForm = verb.negMasu;
        verbRom = verb.negMasu;
      } else if (state.sentenceType === 'interrogative') {
        verbForm = verb.baseMasu + "か";
        verbRom = verb.baseMasu + " ka";
      } else {
        verbForm = verb.baseMasu;
        verbRom = verb.baseMasu;
      }
      const fullJp = `${pronounPart} ${objectPart} ${verbForm}`;
      const fullRom = `${pronounRom} ${objectRom} ${verbRom}`;
      return { jp: fullJp, rom: fullRom };
    }

    // ---------- 疑問代名詞パターン ----------
    if (state.pattern === 'questionWord') {
      const qw = state.selectedQuestionWord;
      if (!qw) return { jp: "疑問詞を選んでください", rom: "choose question word" };
      let hasVerb = state.verbChosenForQW;
      let hasNounAdj = state.nounAdjForQW;
      if (!hasVerb && !hasNounAdj) return { jp: "動詞 または 形容詞/名詞 を選んでください", rom: "choose verb or adj/noun" };

      let predPart = "", predRom = "";
      let questionParticle = "";
      if (hasVerb) {
        let verb = hasVerb;
        if (qw.jp === "なに") questionParticle = "を";
        else if (qw.jp === "どこ") questionParticle = "へ";
        else if (qw.jp === "だれ") questionParticle = "が";
        let verbForm = (state.sentenceType === 'negative' ? verb.negMasu : verb.baseMasu);
        if (state.sentenceType === 'interrogative') verbForm = verb.baseMasu + "か";
        predPart = `${questionParticle ? questionParticle+" " : ""}${verbForm}`;
        predRom = predPart;
      } else if (hasNounAdj) {
        let item = hasNounAdj;
        let isAdj = ADJECTIVES.includes(item);
        if (isAdj) {
          let adjForm = item.jp;
          if (state.sentenceType === 'negative') {
            let stem = adjForm.slice(0, -1);
            if (adjForm === "いい") stem = "よ";
            adjForm = stem + "くないです";
          } else adjForm = adjForm + "です";
          predPart = adjForm;
        } else {
          let nounForm = item.jp + (state.sentenceType === 'negative' ? "じゃないです" : "です");
          predPart = nounForm;
        }
      }
      const qwDisplay = `${qw.jp}${questionParticle ? `-${questionParticle}` : ''}`;
      const qwRom = `${qw.rom}${questionParticle ? `-${questionParticle === "へ" ? "e" : questionParticle}` : ''}`;
      let jp = `${pronounPart} ${qwDisplay} ${predPart}`;
      let rom = `${pronounRom} ${qwRom} ${predRom}`;
      return { jp, rom };
    }
    return { jp: "まだ文が作れていません", rom: "incomplete" };
  }

  function updateSentenceDisplay() {
    const { jp, rom } = buildCurrentSentence();
    jpSentenceSpan.innerText = jp;
    romajiSentenceSpan.innerText = rom;
  }

  function renderUI() {
    let html = `<div class="buttons-grid"><button id="backBtn" class="option-btn back-btn">🔙 戻る / Back</button>`;
    const state = currentState;
    if (state.step === 0) {
      html += `<button data-action="pattern_copula" class="option-btn">📘 〜は〇〇です (noun/adj)</button>`;
      html += `<button data-action="pattern_verb" class="option-btn">⚡ 〜は〜を動詞 (trans/motion)</button>`;
      html += `<button data-action="pattern_qw" class="option-btn">❓ 疑問詞文 (〜は何・どこ～)</button>`;
      html += `</div>`;
    }
    else if (state.step === 1) {
      PRONOUNS.forEach(p => {
        html += `<button data-select="pronoun" data-jp="${p.jp}" data-rom="${p.rom}" data-particle="${p.particle}" class="option-btn">${p.jp}-${p.particle}  (${p.rom}-${p.particle === "は" ? "wa" : p.particle})</button>`;
      });
      html += `</div>`;
    }
    else if (state.pattern === 'copula') {
      if (state.step === 2) {
        html += `<button data-copula-type="adj" class="option-btn">📗 形容詞 (i-adjective)</button>`;
        html += `<button data-copula-type="noun" class="option-btn">📙 名詞 (noun)</button></div>`;
      } else if (state.step === 3 && state.copulaMode === 'adj') {
        ADJECTIVES.forEach(a => {
          html += `<button data-select-adj="${a.jp}" data-rom="${a.rom}" class="option-btn">${a.jp} (${a.rom})</button>`;
        });
        html += `</div>`;
      } else if (state.step === 3 && state.copulaMode === 'noun') {
        NOUNS.forEach(n => {
          html += `<button data-select-noun="${n.jp}" data-rom="${n.rom}" class="option-btn">${n.jp} (${n.rom})</button>`;
        });
        html += `</div>`;
      } else if (state.step === 4) {
        html += `<button data-sent-type="affirmative" class="option-btn">✅ 肯定 (Affirmative)</button>`;
        html += `<button data-sent-type="negative" class="option-btn">❌ 否定 (Negative)</button>`;
        html += `<button data-sent-type="interrogative" class="option-btn">❓ 疑問 (Interrogative)</button></div>`;
      }
    }
    else if (state.pattern === 'verbObj') {
      if (state.step === 2) {
        VERBS.forEach(v => {
          html += `<button data-select-verb='${JSON.stringify(v)}' class="option-btn">${v.jp} (${v.rom})</button>`;
        });
        html += `</div>`;
      } else if (state.step === 3) {
        let verb = state.selectedVerb;
        if (verb && verb.type === 'motion') {
          LOCATIONS.forEach(loc => {
            html += `<button data-select-location='${JSON.stringify(loc)}' class="option-btn">${loc.jp} (${loc.rom})</button>`;
          });
        } else {
          NOUNS.forEach(n => {
            html += `<button data-select-object='${JSON.stringify(n)}' class="option-btn">${n.jp} (${n.rom})</button>`;
          });
        }
        html += `</div>`;
      } else if (state.step === 4) {
        html += `<button data-sent-type="affirmative" class="option-btn">✔ 肯定</button>`;
        html += `<button data-sent-type="negative" class="option-btn">✘ 否定</button>`;
        html += `<button data-sent-type="interrogative" class="option-btn">❔ 疑問</button></div>`;
      }
    }
    else if (state.pattern === 'questionWord') {
      if (state.step === 2) {
        QUESTION_WORDS.forEach(q => {
          html += `<button data-select-qw='${JSON.stringify(q)}' class="option-btn">${q.jp} (${q.rom})</button>`;
        });
        html += `</div>`;
      } else if (state.step === 3) {
        html += `<button data-qw-part="verb" class="option-btn">➕ 動詞を使う (with verb)</button>`;
        html += `<button data-qw-part="nounadj" class="option-btn">📚 名詞/形容詞 (noun/adj)</button></div>`;
      } else if (state.step === 4 && state.needVerbForQW) {
        VERBS.forEach(v => {
          html += `<button data-select-qv='${JSON.stringify(v)}' class="option-btn">${v.jp} (${v.rom})</button>`;
        });
        html += `</div>`;
      } else if (state.step === 4 && !state.needVerbForQW) {
        ADJECTIVES.forEach(a => {
          html += `<button data-select-qna='${JSON.stringify(a)}' type="adj" class="option-btn">${a.jp} (adj)</button>`;
        });
        NOUNS.forEach(n => {
          html += `<button data-select-qna='${JSON.stringify(n)}' type="noun" class="option-btn">${n.jp} (noun)</button>`;
        });
        html += `</div>`;
      } else if (state.step === 5) {
        html += `<button data-sent-type="affirmative" class="option-btn">✅ 肯定</button>`;
        html += `<button data-sent-type="negative" class="option-btn">❌ 否定</button>`;
        html += `<button data-sent-type="interrogative" class="option-btn">❓ 疑問(か)</button></div>`;
      }
    }
    dynamicPanel.innerHTML = html;
    attachPanelEvents();
    updateSentenceDisplay();
  }

  function attachPanelEvents() {
    document.querySelectorAll('[data-action]').forEach(btn => {
      btn.onclick = () => {
        let act = btn.dataset.action;
        if (act === 'pattern_copula') { currentState.pattern = 'copula'; currentState.step = 1; navStack.push({...currentState}); renderUI(); }
        if (act === 'pattern_verb') { currentState.pattern = 'verbObj'; currentState.step = 1; navStack.push({...currentState}); renderUI(); }
        if (act === 'pattern_qw') { currentState.pattern = 'questionWord'; currentState.step = 1; navStack.push({...currentState}); renderUI(); }
      };
    });
    document.querySelectorAll('[data-select="pronoun"]').forEach(btn => {
      btn.onclick = () => {
        let jp = btn.dataset.jp, rom = btn.dataset.rom, particle = btn.dataset.particle;
        currentState.selectedPronoun = { jp, rom, particle };
        currentState.step = 2;
        if (currentState.pattern === 'copula') { currentState.copulaMode = null; renderUI(); }
        else if (currentState.pattern === 'verbObj') { renderUI(); }
        else if (currentState.pattern === 'questionWord') { renderUI(); }
        else renderUI();
      };
    });
    document.querySelectorAll('[data-copula-type]').forEach(btn => {
      btn.onclick = () => {
        currentState.copulaMode = btn.dataset.copulaType;
        currentState.step = 3;
        renderUI();
      };
    });
    document.querySelectorAll('[data-select-adj]').forEach(btn => {
      btn.onclick = () => { currentState.selectedAdjective = { jp: btn.dataset.selectAdj, rom: btn.dataset.rom }; currentState.step = 4; renderUI(); };
    });
    document.querySelectorAll('[data-select-noun]').forEach(btn => {
      btn.onclick = () => { currentState.selectedCopulaNoun = { jp: btn.dataset.selectNoun, rom: btn.dataset.rom }; currentState.step = 4; renderUI(); };
    });
    document.querySelectorAll('[data-select-verb]').forEach(btn => {
      btn.onclick = () => { let v = JSON.parse(btn.dataset.selectVerb); currentState.selectedVerb = v; currentState.step = 3; renderUI(); };
    });
    document.querySelectorAll('[data-select-object]').forEach(btn => {
      btn.onclick = () => { currentState.selectedObjectNoun = JSON.parse(btn.dataset.selectObject); currentState.step = 4; renderUI(); };
    });
    document.querySelectorAll('[data-select-location]').forEach(btn => {
      btn.onclick = () => { currentState.selectedLocation = JSON.parse(btn.dataset.selectLocation); currentState.step = 4; renderUI(); };
    });
    document.querySelectorAll('[data-sent-type]').forEach(btn => {
      btn.onclick = () => { currentState.sentenceType = btn.dataset.sentType; renderUI(); updateSentenceDisplay(); };
    });
    document.querySelectorAll('[data-select-qw]').forEach(btn => {
      btn.onclick = () => { currentState.selectedQuestionWord = JSON.parse(btn.dataset.selectQw); currentState.step = 3; renderUI(); };
    });
    document.querySelectorAll('[data-qw-part]').forEach(btn => {
      btn.onclick = () => { let useVerb = (btn.dataset.qwPart === 'verb'); currentState.needVerbForQW = useVerb; currentState.step = 4; renderUI(); };
    });
    document.querySelectorAll('[data-select-qv]').forEach(btn => {
      btn.onclick = () => { currentState.verbChosenForQW = JSON.parse(btn.dataset.selectQv); currentState.step = 5; renderUI(); };
    });
    document.querySelectorAll('[data-select-qna]').forEach(btn => {
      btn.onclick = () => { let item = JSON.parse(btn.dataset.selectQna); currentState.nounAdjForQW = item; currentState.step = 5; renderUI(); };
    });
    const backBtn = document.getElementById('backBtn');
    if (backBtn) backBtn.onclick = () => { if(currentState.step > 0) currentState.step--; renderUI(); };
  }

  function resetState() { currentState = { step:0, pattern:null, selectedPronoun:null, sentenceType:'affirmative' }; renderUI(); }

  // theme & i18n
  document.getElementById('themeToggleBtn').onclick = () => {
    darkTheme = !darkTheme;
    document.body.classList.toggle('dark', darkTheme);
  };
  document.getElementById('langToggleBtn').onclick = () => { alert("Interface bilingual: buttons show both JP/EN"); };
  speakButton.onclick = () => { let txt = jpSentenceSpan.innerText; if(txt && !txt.includes("👈")) speakJapaneseSentence(txt); };
  document.body.classList.add('dark');
  resetState();

  // ---------- Service Worker 登録 (PWA) ----------
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then(reg => {
        console.log('Service Worker registered: ', reg);
      }).catch(err => {
        console.log('SW registration failed: ', err);
      });
    });
  }
</script>
</body>
</html>
